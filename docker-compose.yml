version: '3.8'

services:
  mia-api:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  data:
  outputs:
  logs:
